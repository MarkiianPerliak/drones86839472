<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <title>KPPT - Drone Service</title>
    <link rel="icon" href="./assets/icons/fpvlogo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/base/common.css">
    <link rel="stylesheet" href="./css/base/normalize.css">
    <link rel="stylesheet" href="./css/base/reset.css">
    <script type="text/javascript" src="https://cdn.emailjs.com/sdk/3.2.0/email.min.js"></script>
</head>

<body>
    <header id="header" class="header">
        <div class="container flexbox">
            <nav class="header__nav">
                <div class="header__menu-box">
                    <a href="./index.html"><img draggable="false" class="header__logo"
                            src="./assets/icons/fpvlogo.svg"></img></a>
                    <svg class="header__svg" fill="#ffffff" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg"
                        xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 24.75 24.75" xml:space="preserve"
                        stroke="#ffffff">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                            <g>
                                <path
                                    d="M0,3.875c0-1.104,0.896-2,2-2h20.75c1.104,0,2,0.896,2,2s-0.896,2-2,2H2C0.896,5.875,0,4.979,0,3.875z M22.75,10.375H2 c-1.104,0-2,0.896-2,2c0,1.104,0.896,2,2,2h20.75c1.104,0,2-0.896,2-2C24.75,11.271,23.855,10.375,22.75,10.375z M22.75,18.875H2 c-1.104,0-2,0.896-2,2s0.896,2,2,2h20.75c1.104,0,2-0.896,2-2S23.855,18.875,22.75,18.875z">
                                </path>
                            </g>
                        </g>
                    </svg>
                </div>

                <div class="flexbox nomobile">
                    <a href="./index.html"><img draggable="false" class="header__logo"
                            src="./assets/icons/fpvlogo.svg"></img></a>
                    <a data-i18n="hhome" class="header__link special-link" href="./index.html"></a>
                    <ul class="header__lang-change">
                        <li class="header__lang-opt line"><button data-lang="en"
                                class="header__lang-actv lang-left">En</button></li>
                        <li class="header__lang-opt"><button data-lang="fi"
                                class="header__lang-actv lang-right">Su</button>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>


    <section class="drone-service">
        <div class="container drone-service-cont">
            <h1 data-i18n="dsheadline" class="drone-service__headline"></h1>
            <p data-i18n="dstext" class="drone-service__text">
            </p>
            <button data-i18n="dsbutton" class="drone-service__button"></button>
            <img draggable="false" class="drone-service__img" src="./assets/icons/fpvlogogray.svg" alt="">
        </div>
    </section>


    <footer id="footer">
        <div class="container flexbox">
            <img draggable="false" class="footer__logo" src="./assets/icons/fpvlogo.svg"></img>
            <ul class="footer__sections dsfooter__list">
                <li class="footer__section">
                    <a data-i18n="ftheader" href="#header" class="footer__section-name"></a>
                </li>
                <li class="footer__section">
                    <a data-i18n="fthero" href="#hero" class="footer__section-name"></a>
                </li>
                <li class="footer__section">
                    <a data-i18n="ftfooter" href="#footer" class="footer__section-name"></a>
                </li>
            </ul>
            <div class="footer__contact-box">
                <p class="footer__contact" data-i18n="ftcontact"></p>
                <a class="footer__email" href="mailto:info@kppt.fi">info@kppt.fi</a>
            </div>
        </div>
    </footer>

    <div class="backdrop contact-us-backdrop">
        <div class="modal contact-us-modal">
            <button type="button" class="close close-ct-modal"><img class="closepic" draggable="false"
                        src="./assets/icons/cross.svg" alt=""></button>
            <h1 class="contact-us-modal-headline" data-i18n="dsmdheadline"></h1>
            
            <div class="contact-us-modal-fb">

            
            <form id="modal-form" action="">
                <div class="input-container">
                    <input placeholder=" " class="cumodal-input" type="text" name="user" id="">
                    <label class="modal-label" data-i18n="ctlbname" for=""></label>
                </div>
                <div class="input-container">
                    <input placeholder=" " class="cumodal-input" type="text" name="email" id="">
                    <label class="modal-label" data-i18n="ctemail" for=""></label>
                </div>
                <div class="input-container">
                    <input placeholder=" " class="cumodal-input" type="text" name="type" id="">
                    <label class="modal-label" data-i18n="cutype" for=""></label>
                </div>
                <div class="input-container">
                    <input placeholder=" " class="cumodal-input" type="text" name="message" id="">
                    <label class="modal-label" data-i18n="ctlbmessage" for=""></label>
                </div>
                <input type="hidden" name="_captcha" value="false">
                <button data-i18n="ctsubmit" type="submit" class="cumodal-submit"></button>
            </form>
            <img class="modal-form-pic" draggable="false" src="./assets/icons/fpvlogo.svg" alt="">
            </div>
        </div>
    </div>

    <div class="backdrop header-backdrop">
        <div class="header-modal">
            <button type="button" class="close close-header"><img class="closepic img-headerclose" draggable="false"
                    src="./assets/icons/cross.svg" alt=""></button>
            <a href="./index.html"><img draggable="false" class="header__logo img-header"
                    src="./assets/icons/fpvlogo.svg"></img></a>


            <ul class="header-modal-list">
                <li class="header__item"><a data-i18n="hhome" class="header__link header__link-modal"
                        href="./index.html"></a>
                </li>
            </ul>
            <ul class="header__lang-change ">
                <li class="header__lang-opt line"><button data-lang="en"
                        class="header__lang-actv lang-left hmlang">En</button>
                </li>
                <li class="header__lang-opt"><button data-lang="fi"
                        class="header__lang-actv lang-right hmlang">Su</button>
                </li>
            </ul>
        </div>
    </div>
    <script type="module" src="./js/modal.js"></script>
    <script type="module" src="./js/drone-service.js"></script>
    <script type="module" src="./js/translator.js"></script>
</body>

</html>
